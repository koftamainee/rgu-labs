name: C CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Ninja
        uses: chrislennon/setup-ninja@v1

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v1

      - name: Configure and Build
        run: make build_linux

      - name: Run Clean-up
        run: make clean
